# Application Port
server.port=8082


# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.com.scanner=DEBUG

# Default Database Configuration: H2 In-Memory (Runs out-of-the-box without manual MySQL setup)
spring.datasource.url=jdbc:h2:mem:scannerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console for DB verification (accessible via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- PRODUCTION MYSQL CONFIGURATION ---
# To switch to MySQL: comment out the H2 settings above and uncomment the lines below:
# spring.datasource.url=jdbc:mysql://localhost:3306/scannerdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
